faq:
- question: Who can attend tryouts?
  answer: Players aged 10U–14U, depending on roster needs and openings by season.
- question: How many sessions should my player attend?
  answer: Players only need to attend one open evaluation date or the formal tryout
    unless a two-day tryout is noted.
- question: Where are tryouts held?
  answer: Locations vary by age group and session across the Northern Virginia area.
